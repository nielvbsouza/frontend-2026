<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trabalho</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background-color: antiquewhite;
    font-family: Arial, Helvetica, sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}


.menu{
    background-color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 05%;
    height: 120px; 
    margin-top: 30px;

}

.menu img{
    height: 150px;
    width: auto;
    margin-left: 20px;
}



.menu nav ul{
    display: flex;
    list-style: none;
    gap: 20px;
}

.menu nav ul li{
    background-color: black;
    padding: 10px 20px;
    border-radius: 10px;
}

.menu nav ul li a{
    text-decoration: none;
    color: white;
    font-size: 18px;
}


@media (max-width: 768px){

    .menu{
        flex-direction: column;
        height: auto;
        padding: 20px;
        gap: 15px;
    }

    .menu nav ul{
        flex-direction: column;
        align-items: center;
    }

}

</style>
</head>

<body>

<div class="menu">
    <img src="./imagens/logo.png" alt="logo">
    <nav>
        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="portifolio.html">Portfólio</a></li>
            <li><a href="trabalho.html">Trabalho</a></li>
            <li><a href="contato.html">Contato</a></li>
        </ul>
    </nav>
</div>


</body>
</html>
